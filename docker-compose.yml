services:
    postgres:
        image: postgres:16
        container_name: tacticalc2-postgres
        environment:
            POSTGRES_USER: tacticalc2
            POSTGRES_PASSWORD: tacticalc2_dev_password
            POSTGRES_DB: tacticalc2
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
